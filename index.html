<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aftercare Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-watch watch-a"></div>
      <div class="hero-watch watch-b"></div>
      <div class="hero-watch watch-c"></div>
      <div class="hero-watch watch-d"></div>

      <div class="hero-topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <span>QuickzFit</span>
        </div>

        <div class="hero-actions">
          <a class="hero-link" href="#">Retour au site</a>
          <a class="hero-link hero-link-primary" href="#formPanel">Envoyer une demande</a>
        </div>
      </div>

      <div class="hero-center">
        <p class="eyebrow">Service après-vente</p>
        <h1>Envoyer une demande</h1>
        <div class="hero-search" aria-hidden="true">
          <span class="search-icon"></span>
          <span class="search-placeholder">Posez moi votre question...</span>
        </div>
      </div>
    </section>

    <section class="form-section" id="formPanel">
      <div class="section-intro">
        <p class="required-note">Les champs marqués d'un astérisque (*) sont obligatoires.</p>
      </div>

      <div class="form-layout">
        <div class="app">
          <div class="form-header">
            <div>
              <p class="form-kicker">Formulaire SAV intelligent</p>
              <h2>Choisissez votre chemin de traitement</h2>
            </div>

            <div class="progress-wrap">
              <div class="meta">
                <div class="tag" id="stepLabel">Étape 1 / 3</div>
                <div class="tag" id="pathLabel">Aucun chemin sélectionné</div>
              </div>

              <div class="progress">
                <span id="progressBar"></span>
              </div>
            </div>
          </div>

          <div class="content">
            <div class="card">
              <div id="stepRoot"></div>
              <div id="resultRoot" class="hidden"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
